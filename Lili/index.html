<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Responsive viewport for all device sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />

    <title>LaCasa | دارك هنا</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons (LaCasa logo) -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon"       href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <!-- Theme color (crimson brand) -->
    <meta name="theme-color" content="#e01845" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a0008"  media="(prefers-color-scheme: dark)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LaCasa" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO / Social -->
    <meta name="description" content="منصتك الأولى لحجز وعرض البيوت الاستثنائية في الجزائر" />
    <meta property="og:title"       content="LaCasa | دارك هنا" />
    <meta property="og:description" content="منصتك الأولى لحجز وعرض البيوت الاستثنائية في الجزائر" />
    <meta property="og:image"       content="/icon-512.png" />
    <meta property="og:type"        content="website" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Safe area CSS variable polyfill for older iOS -->
    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
